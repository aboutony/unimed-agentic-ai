<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="24" y1="20" x2="48" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="36" cy="36" r="34" fill="url(#bgGrad)" opacity="0.12"/>
  <circle cx="36" cy="36" r="34" fill="none" stroke="url(#bgGrad)" stroke-width="2"/>
  <!-- Medical cross -->
  <g filter="url(#glow)">
    <rect x="30" y="18" width="12" height="36" rx="3" fill="url(#crossGrad)" opacity="0.95"/>
    <rect x="18" y="30" width="36" height="12" rx="3" fill="url(#crossGrad)" opacity="0.95"/>
  </g>
  <!-- AI circuit nodes -->
  <circle cx="16" cy="20" r="2.5" fill="#14B8A6" opacity="0.7"/>
  <circle cx="56" cy="20" r="2.5" fill="#14B8A6" opacity="0.7"/>
  <circle cx="16" cy="52" r="2.5" fill="#14B8A6" opacity="0.7"/>
  <circle cx="56" cy="52" r="2.5" fill="#14B8A6" opacity="0.7"/>
  <!-- Circuit lines -->
  <line x1="16" y1="20" x2="24" y2="30" stroke="#14B8A6" stroke-width="1" opacity="0.4"/>
  <line x1="56" y1="20" x2="48" y2="30" stroke="#14B8A6" stroke-width="1" opacity="0.4"/>
  <line x1="16" y1="52" x2="24" y2="42" stroke="#14B8A6" stroke-width="1" opacity="0.4"/>
  <line x1="56" y1="52" x2="48" y2="42" stroke="#14B8A6" stroke-width="1" opacity="0.4"/>
  <!-- Center AI dot -->
  <circle cx="36" cy="36" r="3" fill="#0D9488" opacity="0.6"/>
</svg>
